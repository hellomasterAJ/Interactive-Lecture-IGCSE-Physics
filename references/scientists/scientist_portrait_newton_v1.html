<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isaac Newton Portrait — InteractiveLecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }
  .portrait-card {
    background: #f5efe6;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  svg {
    display: block;
    width: 400px;
    height: 500px;
  }
</style>
</head>
<body>
<div class="portrait-card">
  <svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="400" height="500" fill="#f5efe6" rx="16"/>

    <!-- Large faint circle behind head -->
    <circle cx="200" cy="210" r="130" fill="#e8dfd0" opacity="0.6"/>

    <!-- Decorative symbols around the circle -->

    <!-- Apple icon (top-left) -->
    <g transform="translate(95, 115)">
      <circle cx="0" cy="4" r="12" fill="#c0392b" opacity="0.7"/>
      <path d="M-2,-2 Q0,-8 2,-2" fill="none" stroke="#6d4c41" stroke-width="1.5"/>
      <ellipse cx="0" cy="-10" rx="3" ry="5" fill="#4caf50" opacity="0.6"/>
    </g>

    <!-- Prism with rainbow (top-right) -->
    <g transform="translate(290, 100)">
      <polygon points="0,0 20,0 10,18" fill="#8d6e63" opacity="0.7" stroke="#6d4c41" stroke-width="1"/>
      <!-- Rainbow lines -->
      <line x1="10" y1="18" x2="10" y2="28" stroke="#e53935" stroke-width="1.5" opacity="0.5"/>
      <line x1="8" y1="18" x2="7" y2="28" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
      <line x1="6" y1="18" x2="4" y2="28" stroke="#ffeb3b" stroke-width="1.5" opacity="0.5"/>
      <line x1="12" y1="18" x2="13" y2="28" stroke="#4caf50" stroke-width="1.5" opacity="0.5"/>
      <line x1="14" y1="18" x2="16" y2="28" stroke="#2196f3" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Pi symbol (right side) -->
    <g transform="translate(300, 200)">
      <text font-family="serif" font-size="20" fill="#6d4c41" opacity="0.5" font-style="italic">π</text>
    </g>

    <!-- F=ma equation (left side) -->
    <g transform="translate(80, 260)">
      <text font-family="Georgia, serif" font-size="14" fill="#6d4c41" opacity="0.4" font-style="italic">F = ma</text>
    </g>

    <!-- Star (bottom-right) -->
    <g transform="translate(295, 265)">
      <polygon points="0,-8 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3" fill="#6d4c41" opacity="0.4"/>
    </g>

    <!-- Small star (bottom-left) -->
    <g transform="translate(90, 200)">
      <polygon points="0,-5 1.5,-2 5,-2 2,0.5 3,4 0,2 -3,4 -2,0.5 -5,-2 -1.5,-2" fill="#6d4c41" opacity="0.3"/>
    </g>

    <!-- Newton's Body / Coat -->
    <path d="M 140,340 Q 140,280 160,260 L 240,260 Q 260,280 260,340 L 270,420 Q 200,440 130,420 Z" fill="#2c3e50"/>

    <!-- Coat collar / lapels -->
    <path d="M 160,260 L 175,300 L 200,280 L 225,300 L 240,260" fill="#1a252f"/>
    <!-- White cravat / neckerchief -->
    <path d="M 175,275 Q 200,295 225,275 Q 200,310 175,275 Z" fill="#fafafa"/>
    <path d="M 185,280 Q 200,310 215,280" fill="none" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Neck -->
    <rect x="182" y="248" width="36" height="20" rx="6" fill="#f5d0b0"/>

    <!-- Head -->
    <ellipse cx="200" cy="210" rx="50" ry="58" fill="#f5d0b0"/>

    <!-- Gray wig (curly 17th-century style) -->
    <path d="M 150,195 Q 145,160 155,145 Q 165,130 185,135 L 185,140 Q 170,138 162,150 Q 155,165 158,185" fill="#d7ccc8"/>
    <path d="M 150,195 Q 148,180 152,165 Q 158,148 170,142 L 172,148 Q 160,155 156,170 Q 154,185 155,195" fill="#c4b4a8"/>
    <!-- Wig top -->
    <path d="M 155,150 Q 200,115 245,150 L 245,158 Q 200,128 155,158 Z" fill="#d7ccc8"/>
    <!-- Right side wig -->
    <path d="M 250,195 Q 255,160 245,145 Q 235,130 215,135 L 215,140 Q 230,138 238,150 Q 245,165 242,185" fill="#d7ccc8"/>
    <path d="M 250,195 Q 252,180 248,165 Q 242,148 230,142 L 228,148 Q 240,155 244,170 Q 246,185 245,195" fill="#c4b4a8"/>
    <!-- Wig curls on shoulders -->
    <path d="M 148,200 Q 140,210 138,225 Q 136,240 142,250 Q 148,255 152,248" fill="#d7ccc8" stroke="#c4b4a8" stroke-width="0.5"/>
    <path d="M 252,200 Q 260,210 262,225 Q 264,240 258,250 Q 252,255 248,248" fill="#d7ccc8" stroke="#c4b4a8" stroke-width="0.5"/>

    <!-- Eyes -->
    <ellipse cx="186" cy="208" rx="5" ry="4" fill="#2c3e50"/>
    <ellipse cx="214" cy="208" rx="5" ry="4" fill="#2c3e50"/>
    <!-- Eye shine -->
    <circle cx="188" cy="206" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="216" cy="206" r="1.5" fill="#fff" opacity="0.8"/>

    <!-- Eyebrows (slightly furrowed - thoughtful) -->
    <path d="M 178,200 Q 186,196 194,199" fill="none" stroke="#5d4037" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 206,199 Q 214,196 222,200" fill="none" stroke="#5d4037" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 198,212 Q 200,222 204,222" fill="none" stroke="#d4a574" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Mouth (subtle smile) -->
    <path d="M 192,232 Q 200,237 208,232" fill="none" stroke="#b07050" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Rosy cheeks -->
    <ellipse cx="178" cy="224" rx="8" ry="4" fill="#f0b8a0" opacity="0.5"/>
    <ellipse cx="222" cy="224" rx="8" ry="4" fill="#f0b8a0" opacity="0.5"/>

    <!-- Right arm holding apple -->
    <path d="M 240,310 Q 255,300 265,310 Q 270,315 268,325 Q 265,330 260,325" fill="none" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="265" cy="320" r="8" fill="#f5d0b0"/>

    <!-- Apple being held -->
    <g transform="translate(270, 310)">
      <ellipse cx="0" cy="0" rx="12" ry="13" fill="#c0392b"/>
      <ellipse cx="-3" cy="-2" rx="4" ry="5" fill="#e74c3c" opacity="0.4"/>
      <path d="M -1,-13 Q 0,-17 1,-13" fill="none" stroke="#6d4c41" stroke-width="1.5"/>
      <ellipse cx="0" cy="-15" rx="3" ry="5" fill="#4caf50" opacity="0.7"/>
    </g>

    <!-- Left arm at side -->
    <path d="M 160,310 Q 145,300 138,320" fill="none" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>

    <!-- Motion lines near apple for playful energy -->
    <line x1="285" y1="300" x2="292" y2="296" stroke="#a0a0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="287" y1="308" x2="295" y2="307" stroke="#a0a0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="283" y1="318" x2="290" y2="320" stroke="#a0a0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

    <!-- Motion lines near coat edge -->
    <line x1="135" y1="350" x2="128" y2="348" stroke="#a0a0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="137" y1="370" x2="130" y2="372" stroke="#a0a0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

    <!-- Name banner at bottom -->
    <g transform="translate(200, 430)">
      <rect x="-130" y="-18" width="260" height="36" rx="18" fill="#fafaf8" stroke="#d4c9b0" stroke-width="1.5"/>
      <text x="0" y="6" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="3" fill="#2c3e50">ISAAC NEWTON</text>
    </g>
  </svg>
</div>
</body>
</html>
