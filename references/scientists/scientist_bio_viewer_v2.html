// ===== ERA DATA =====
const eras = [
  { id: 'ancient',     label: 'Ancient\nGreece',       years: '384–212 BC',  desc: 'The foundations of Western science — natural philosophy, geometry, and early physics. Scientists like Aristotle and Archimedes relied on observation and logic rather than experiment.' },
  { id: 'revolution',   label: 'Scientific\nRevolution', years: '1543–1727',  desc: 'A period of radical change. Copernicus, Galileo, Kepler, Newton — the scientific method was born, overturning 2,000 years of Aristotelian thought.' },
  { id: 'enlightenment',label: 'Enlight-\nement',        years: '1686–1823',  desc: 'Reason and measurement flourished. Fahrenheit, Celsius, Coulomb, Volta — precise instruments enabled quantitative physics.' },
  { id: 'industrial',   label: 'Industrial\nRevolution', years: '1736–1907',  desc: 'Science met engineering. Watt\'s steam engine, Carnot\'s thermodynamics, Kelvin\'s telegraph — physics powered the modern world.' },
  { id: '19th',         label: '19th\nCentury',          years: '1773–1901',  desc: 'The golden age of experimental physics. Faraday, Maxwell, Hertz — electricity, magnetism, and light were unified.' },

];

// ===== TOPIC DATA =====
const topics = [
  { num: '1', name: 'General Physics',       color: '#22d3ee', desc: 'Motion, forces, energy, pressure, density. The language in which the universe is written.' },
  { num: '2', name: 'Thermal Physics',        color: '#f97316', desc: 'Heat, temperature, gas laws, kinetic theory. From thermometers to thermodynamics.' },
  { num: '3', name: 'Waves & Light',          color: '#a78bfa', desc: 'Wave properties, light, EM spectrum, sound. The physics of information and perception.' },
  { num: '4', name: 'Electricity & Magnetism',color: '#34d399', desc: 'Circuits, electromagnetism, induction. The force that powers civilisation.' },
  { num: '5', name: 'Atomic Physics',         color: '#fb923c', desc: 'Radioactivity, nuclear model, quantum theory. The strange world inside the atom.' },
  { num: '6', name: 'Space Physics',          color: '#f472b6', desc: 'Solar system, stars, cosmology. Our place in the expanding universe.' },
];

// ===== STATE =====
let lang = 'en';
let activeEra = null;
let activeTopic = null;

// ===== RENDER (from v1) =====
function render() {
  const grid = document.getElementById('cardGrid');
  let filtered = scientists;
  if (activeEra) filtered = filtered.filter(s => s.era === activeEra);
  if (activeTopic) filtered = filtered.filter(s => s.related_topics && s.related_topics.some(t => t.startsWith(activeTopic + '.')));

  // Update filter status
  const fs = document.getElementById('filterStatus');
  let label = `Showing <span>${filtered.length}</span> of ${scientists.length} scientists`;
  const parts = [];
  if (activeEra) parts.push(`Era: <span>${activeEra}</span>`);
  if (activeTopic) parts.push(`Topic <span>${activeTopic}</span>`);
  if (parts.length) label += ` · ${parts.join(' · ')}`;
  fs.innerHTML = label;

  grid.innerHTML = filtered.map(s => {
    const bioArr = lang === 'en' ? s.biography : (s.biography_th || s.biography);
    const bioShort = bioArr.slice(0,1).map(p => `<li>${p}</li>`).join('');
    const bioRest = bioArr.slice(1).map(p => `<li>${p}</li>`).join('');
    const hasMore = bioArr.length > 1;

    const expHtml = (s.key_experiments || []).map(e => {
      const isEn = lang === 'en';
      const title = isEn ? e.title : (e.title_th || e.title);
      const desc = isEn ? e.description : (e.desc_th || e.description);
      const myth = isEn ? e.myth_vs_fact : (e.myth_th || e.myth_vs_fact);
      let mythHtml = '';
      if (myth) {
        const isMyth = !isEn || (e.myth_vs_fact && (e.myth_vs_fact.includes('DID NOT') || e.myth_vs_fact.includes('MISREPRESENTED') || e.myth_vs_fact.includes('legend')));
        mythHtml = `<div class="exp-myth"><span class="${isMyth ? 'myth-label' : 'fact-label'}">${isEn ? (isMyth ? '⚠️ Myth vs Fact' : '📌 Note') : (isMyth ? '⚠️ ตำนานvsความจริง' : '📌 หมายเหตุ')}</span><br>${myth}</div>`;
      }
      return `<div class="experiment-card"><div class="exp-title">🔬 ${title} <span class="exp-year">${e.year}</span></div><div class="exp-desc">${desc}</div>${mythHtml}</div>`;
    }).join('');

    return `<div class="card">
      <div class="card-header">
        <div class="name">${s.name}</div>
        <div class="lifespan">${s.lifespan}</div>
        <div class="nationality">${s.nationality} • ${s.era}</div>
      </div>
      <div class="card-body">
        <div class="summary">"${lang === 'en' ? s.summary : (s.summary_th || s.summary)}"</div>

        <div class="stars-section" onclick="toggleRating('${s.id}')" title="Click for breakdown">
          <div class="stars-row">
            ${getStars(s.rating?.stars || 0)}
            <span class="star-score">(${s.rating?.stars || 0}/10)</span>
          </div>
          <div class="rating-summary">${lang === 'en' ? (s.rating?.summary_en || '') : (s.rating?.summary_th || '')}</div>
          <div class="rating-hint">${lang === 'en' ? '▼ Click for breakdown' : '▼ คลิกเพื่อดูคะแนนแยก'}</div>
          <div class="rating-breakdown" id="rb-${s.id}">
            ${getBreakdown(s.rating?.breakdown)}
            <div style="margin-top:6px; font-size:0.7rem; color:#94a3b8; border-top:1px solid #1e293b; padding-top:6px;">
              <div style="margin-bottom:4px;">${lang === 'en' ? '📜 Story: ' : '📜 เกร็ดประวัติ: '}${lang === 'en' ? (s.rating?.personality_en || '') : (s.rating?.personality_th || '')}</div>
            </div>
          </div>
        </div>

        <div class="section-label">📜 ${lang === 'en' ? 'Biography' : 'ชีวประวัติ'}</div>
        <ul>${bioShort}</ul>
        ${hasMore ? `<div id="bio-more-${s.id}" style="display:none;"><ul>${bioRest}</ul></div>
        <button class="show-more-btn" onclick="toggleBio('${s.id}')" id="bio-btn-${s.id}">${lang === 'en' ? 'Show more +' : 'แสดงเพิ่ม +'}</button>` : ''}

        <div class="section-label">🔬 ${lang === 'en' ? 'Key Contributions' : 'ผลงานสำคัญ'}</div>
        <ul>${(lang === 'en' ? s.contributions_to_physics : (s.contributions_th || s.contributions_to_physics)).map(c => `<li>${c}</li>`).join('')}</ul>

        ${expHtml ? `<div class="section-label">🧪 ${lang === 'en' ? 'Key Experiments &amp; Events' : 'การทดลองสำคัญและเหตุการณ์'}</div>${expHtml}` : ''}

        <div class="section-label">🏛️ ${lang === 'en' ? 'Legacy' : 'มรดกทางวิทยาศาสตร์'}</div>
        <ul>${(lang === 'en' ? s.legacy : (s.legacy_th || s.legacy)).map(l => `<li>${l}</li>`).join('')}</ul>

        <div class="quote">${lang === 'en' ? s.key_quote : (s.key_quote_th || s.key_quote)}</div>
      </div>
      <div class="card-footer">
        ${(s.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
        ${(s.related_topics || []).map(t => `<span class="tag tag-topic">${t}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ===== HELPERS (from v1) =====
function getStars(n) {
  let out = '';
  for(let i=0;i<10;i++) out += i<n ? '<span class="star-filled">★</span>' : '<span class="star-empty">☆</span>';
  return out;
}

function getBreakdown(bd) {
  if(!bd) return '';
  const colors = {references:'#fbbf24', outstanding_work:'#a78bfa', diversity:'#22d3ee', social_impact:'#34d399', personality:'#fb923c'};
  const enLabels = {references:'📖 References', outstanding_work:'💡 Outstanding Work', diversity:'🔀 Diversity', social_impact:'🌍 Social Impact', personality:'👤 Personality'};
  const thLabels = {references:'📖 การอ้างอิง', outstanding_work:'💡 ผลงานโดดเด่น', diversity:'🔀 ความหลากหลาย', social_impact:'🌍 จุดเปลี่ยนสังคม', personality:'👤 บุคลิกอันโดดเด่น'};
  const labels = lang === 'en' ? enLabels : thLabels;
  const order = ['references', 'outstanding_work', 'diversity', 'social_impact', 'personality'];
  let out = '';
  order.forEach(k => {
    if(!bd[k]) return;
    const pct = (bd[k].score / 10) * 100;
    const label = lang === 'en' ? (bd[k].label_en || labels[k]) : (bd[k].label_th || labels[k]);
    out += '<div class="rb-item"><span class="rb-label">' + label + '</span><div class="rb-bar-wrap"><div class="rb-bar" style="width:' + pct + '%;background:' + colors[k] + '"></div></div><span class="rb-score">' + bd[k].score + '/10</span></div>';
  });
  return out;
}

function toggleBio(id) {
  const more = document.getElementById('bio-more-' + id);
  const btn = document.getElementById('bio-btn-' + id);
  if(!more || !btn) return;
  if (more.style.display === 'none') {
    more.style.display = 'block';
    btn.textContent = lang === 'en' ? 'Show less -' : 'แสดงน้อยลง -';
  } else {
    more.style.display = 'none';
    btn.textContent = lang === 'en' ? 'Show more +' : 'แสดงเพิ่ม +';
  }
}

function toggleRating(id) {
  const el = document.getElementById('rb-' + id);
  if(el) el.classList.toggle('open');
}

// ===== LANG =====
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  render();
}

// ===== RESET =====
function resetAll() {
  activeEra = null;
  activeTopic = null;
  document.querySelectorAll('.timeline-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.topic-seg').forEach(n => n.classList.remove('active'));
  document.getElementById('eraDetail').classList.remove('show');
  render();
}

// ===== TIMELINE =====
function buildTimeline() {
  const el = document.getElementById('timeline');
  el.innerHTML = eras.map((e, i) => `
    <div class="timeline-node ${i === 0 ? 'active' : ''}" data-era="${e.label.replace(/\n/g,' ')}" onclick="selectEra(${i})">
      <div class="dot"></div>
      <div class="era-label">${e.label.replace(/\n/g,'<br>')}</div>
      <div class="era-year">${e.years}</div>
    </div>
  `).join('');
  selectEra(0);
}

function selectEra(idx) {
  const e = eras[idx];
  document.querySelectorAll('.timeline-node').forEach((n, i) => n.classList.toggle('active', i === idx));
  const detail = document.getElementById('eraDetail');
  const eraScientists = scientists.filter(s => s.era === e.label.replace(/\n/g,' ')).length;
  detail.innerHTML = `<div class="ed-name">${e.label.replace(/\n/g,' ')}</div><div class="ed-years">${e.years}</div><div class="ed-desc">${e.desc}</div><div class="ed-count">${eraScientists} scientist${eraScientists !== 1 ? 's' : ''} from this era</div>`;
  detail.classList.add('show');
  if (!activeTopic) {
    activeEra = e.label.replace(/\n/g,' ');
    render();
  }
}

// ===== TOPIC BAR =====
function buildTopicBar() {
  const el = document.getElementById('topicBar');
  el.innerHTML = topics.map(t => {
    const count = scientists.filter(s => s.related_topics && s.related_topics.some(r => r.startsWith(t.num + '.'))).length;
    return `<div class="topic-seg" data-topic="${t.num}" onclick="selectTopic('${t.num}')">
      <div class="topic-tip"><div class="tt-title">📘 Topic ${t.num}: ${t.name}</div><div class="tt-desc">${t.desc}</div></div>
      <div class="t-num">${t.num}</div>
      <div class="t-name">${t.name}</div>
      <div class="t-count">${count} scientists</div>
    </div>`;
  }).join('');
  selectTopic('1');
}

function selectTopic(num) {
  activeTopic = num;
  document.querySelectorAll('.topic-seg').forEach(n => n.classList.toggle('active', n.dataset.topic === num));
  document.querySelectorAll('.timeline-node').forEach(n => n.classList.remove('active'));
  document.getElementById('eraDetail').classList.remove('show');
  activeEra = null;
  render();
}

// ===== INIT =====
buildTimeline();
buildTopicBar();
render();
</script>
</body>
</html>
