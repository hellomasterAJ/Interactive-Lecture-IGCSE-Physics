const grid = document.getElementById('fontGrid');
const picks = new Set();

function render() {
  grid.innerHTML = '';
  const sorted = [...fonts].sort((a, b) => {
    const aPicked = picks.has(a.name);
    const bPicked = picks.has(b.name);
    if (aPicked && !bPicked) return -1;
    if (!aPicked && bPicked) return 1;
    return 0;
  });
  sorted.forEach(f => {
    const card = document.createElement('div');
    card.className = 'font-card' + (picks.has(f.name) ? ' fav' : '');
    card.style.cursor = 'pointer';
    card.dataset.name = f.name;
    card.innerHTML = `
      <div class="font-name">${f.name}</div>
      <div class="font-category">${f.category} · ${f.mood}</div>
      <div class="sample-heading" style="font-family: ${f.family}">${f.heading}</div>
      <div class="sample-body" style="font-family: ${f.family}">${f.body}</div>
      <div class="sample-formula" style="font-family: 'JetBrains Mono', monospace">${f.formula}</div>
    `;
    card.addEventListener('click', () => {
      if (picks.has(f.name)) {
        picks.delete(f.name);
      } else {
        picks.add(f.name);
      }
      render();
    });
    grid.appendChild(card);
  });
}
