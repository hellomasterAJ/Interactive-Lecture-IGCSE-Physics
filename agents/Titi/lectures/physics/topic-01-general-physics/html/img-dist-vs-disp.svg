
<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" style="background-color:#0d1117">
  <!-- Grid -->
  <line x1="50" y1="0" x2="50" y2="250" stroke="white" stroke-dasharray="2,2"/>
  <line x1="150" y1="0" x2="150" y2="250" stroke="white" stroke-dasharray="2,2"/>
  <line x1="250" y1="0" x2="250" y2="250" stroke="white" stroke-dasharray="2,2"/>
  <line x1="350" y1="0" x2="350" y2="250" stroke="white" stroke-dasharray="2,2"/>
  <line x1="450" y1="0" x2="450" y2="250" stroke="white" stroke-dasharray="2,2"/>
  
  <!-- Distance Path -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#58a6ff"/>
    </marker>
  </defs>
  <path d="M70,190 L160,190 L160,80 L310,80 L310,190" stroke="#58a6ff" stroke-width="3" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Displacement Path -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#7ee787"/>
    </marker>
  </defs>
  <line x1="70" y1="190" x2="310" y2="190" stroke="#7ee787" stroke-width="3" marker-end="url(#arrow-green)"/>
  
  <!-- Points -->
  <circle cx="70" cy="190" r="5" fill="gold"/>
  <circle cx="310" cy="190" r="5" fill="gold"/>
  <circle cx="160" cy="190" r="5" fill="grey"/>
  <circle cx="160" cy="80" r="5" fill="grey"/>
  <circle cx="310" cy="80" r="5" fill="grey"/>
  
  <!-- Labels -->
  <text x="115" y="180" fill="#58a6ff" font-family="Arial" font-size="12">90m</text>
  <text x="170" y="135" fill="#58a6ff" font-family="Arial" font-size="12">110m</text>
  <text x="235" y="70" fill="#58a6ff" font-family="Arial" font-size="12">120m</text>
  <text x="190" y="206" fill="#7ee787" font-family="Arial" font-size="12">240m East</text>
  
  <!-- Legend -->
  <rect x="370" y="20" width="16" height="3" stroke="#58a6ff" stroke-width="3" fill="none" stroke-dasharray="6,3"/>
  <text x="390" y="23" fill="white" font-family="Arial" font-size="12">Distance</text>
  <rect x="370" y="40" width="16" height="3" stroke="#7ee787" stroke-width="3" fill="none"/>
  <text x="390" y="43" fill="white" font-family="Arial" font-size="12">Displacement</text>
</svg>